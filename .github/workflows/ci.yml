name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: danh1432/lehoangdanh-courseapp

jobs:
  # ── Job 1: Build & Test ──────────────────────────────────────────────────────
  build-test:
    name: Build & Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build & run unit tests
        run: |
          chmod +x mvnw
          ./mvnw -q verify
        # Tests dùng H2 in-memory — không cần MySQL thật

  # ── Job 2: Docker Build & Push (Docker Hub) ──────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Trigger deploy webhook ────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Triển khai lên DevOps Classroom
        run: |
          REPO="danh1432/lehoangdanh-courseapp"
          set +e
          RESPONSE=$(curl -sS -w "\n%{http_code}" --max-time 60 -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest")
          CURL_EXIT=$?
          set -e
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: ${CODE:-N/A} (curl exit: $CURL_EXIT)"
          if [ "$CURL_EXIT" -ne 0 ] && [ "$CURL_EXIT" -ne 52 ]; then
            echo "Lỗi curl: $CURL_EXIT"
            exit 1
          fi
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "${BODY:-<server closed connection - deploy may be async>}"
          echo "::endgroup::"

      - name: Health check ứng dụng sau deploy
        run: |
          APP_URL="http://157.20.82.3:21010/courses"
          echo "Kiểm tra health URL: $APP_URL"
          for i in {1..18}; do
            if curl -fsS --max-time 8 "$APP_URL" >/dev/null; then
              echo "Ứng dụng đã lên thành công (attempt $i)."
              exit 0
            fi
            echo "Chưa lên (attempt $i/18), đợi 5s..."
            sleep 5
          done
          echo "Health check thất bại: app chưa sẵn sàng sau 90s."
          exit 1
