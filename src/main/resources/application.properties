spring.application.name=lehoangdanh_2280605295_j2ee

# Cổng 80 (Apache), 8080 (Spring/Tomcat cũ) dễ bị chiếm → mặc định 8081.
# Đổi cổng: biến môi trường SERVER_PORT, ví dụ PowerShell: $env:SERVER_PORT=9090
server.port=${SERVER_PORT:8081}

# MySQL — XAMPP: bật MySQL, tạo DB trong phpMyAdmin:
# CREATE DATABASE coursedb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
spring.datasource.url=jdbc:mysql://localhost:3306/coursedb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.thymeleaf.cache=false

# Tài khoản admin (tự tạo khi khởi động nếu chưa có user trùng username)
app.bootstrap.admin.username=lehoangdanh
app.bootstrap.admin.password=2280605295
app.bootstrap.admin.email=lehoangdanh@student.local
# Admin không đăng ký học phần — không gán role STUDENT cho tài khoản bootstrap (trừ khi bật true).
app.bootstrap.admin.include-student-role=false

# Google OAuth2 — BẮT BUỘC: tạo OAuth Client tại https://console.cloud.google.com/apis/credentials
# Loại: Web application. URI chuyển hướng (Authorized redirect URIs), khớp CỔNG app:
#   http://localhost:8081/login/oauth2/code/google   (nếu server.port=8081)
# Điền Client ID/Secret thật qua biến môi trường GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (khuyến nghị),
# hoặc thay trực tiếp giá trị dưới đây (không commit secret lên git công khai).
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
