<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${course.id != null ? 'Sửa học phần' : 'Thêm học phần'}">Học phần</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/layout :: navbar}"></div>

	<main class="container py-4 py-md-5 px-3 px-sm-4">
		<div class="row justify-content-center">
			<div class="col-12 col-lg-8 col-xl-7">
				<h1 class="h3 admin-page-title mb-4" th:text="${course.id != null ? 'Cập nhật học phần' : 'Thêm học phần'}">Form</h1>
				<form class="card auth-card border-0 rounded-4" th:action="@{/admin/courses}" method="post">
					<div class="card-body p-4 p-md-5 vstack gap-3">
						<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
						<input type="hidden" name="id" th:value="${course.id}" th:if="${course.id != null}">

						<div>
							<label class="form-label" for="name">Tên học phần</label>
							<input class="form-control" id="name" name="name" required maxlength="255" th:value="${course.name}">
						</div>
						<div>
							<label class="form-label" for="image">URL hình ảnh minh họa</label>
							<input class="form-control" id="image" name="image" type="text" placeholder="https://..."
								th:value="${course.image}">
						</div>
						<div>
							<label class="form-label" for="credits">Số tín chỉ</label>
							<input class="form-control" id="credits" name="credits" type="number" min="1" max="30" required
								th:value="${course.credits}">
						</div>
						<div>
							<label class="form-label" for="lecturer">Giảng viên</label>
							<input class="form-control" id="lecturer" name="lecturer" required maxlength="200" th:value="${course.lecturer}">
						</div>
						<div>
							<label class="form-label" for="categoryId">Danh mục</label>
							<select class="form-select" id="categoryId" name="categoryId" required>
								<option th:each="cat : ${categories}" th:value="${cat.id}"
									th:selected="${course.category != null and course.category.id == cat.id}"
									th:text="${cat.name}">Danh mục</option>
							</select>
						</div>
						<div class="d-flex flex-column flex-sm-row gap-2 pt-2">
							<button type="submit" class="btn btn-primary">Lưu</button>
							<a class="btn btn-outline-secondary" th:href="@{/admin/courses}">Hủy</a>
						</div>
					</div>
				</form>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
