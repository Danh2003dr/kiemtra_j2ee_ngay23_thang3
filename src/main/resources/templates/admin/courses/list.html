<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Quản trị học phần</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/layout :: navbar}"></div>

	<main class="container py-4 py-md-5 px-3 px-sm-4">
		<div class="d-flex flex-column flex-sm-row justify-content-between align-items-stretch align-items-sm-center gap-3 mb-4">
			<h1 class="h3 admin-page-title mb-0">Quản lý học phần</h1>
			<a class="btn btn-primary flex-shrink-0" th:href="@{/admin/courses/new}">Thêm học phần</a>
		</div>

		<div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
			<span th:text="${success}">OK</span>
			<button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
		</div>

		<div class="table-responsive table-shell">
			<table class="table table-hover align-middle mb-0">
				<thead class="table-light">
					<tr>
						<th>Tên</th>
						<th>Tín chỉ</th>
						<th>Giảng viên</th>
						<th>Danh mục</th>
						<th class="text-end">Thao tác</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="c : ${page.content}">
						<td th:text="${c.name}">Tên</td>
						<td th:text="${c.credits}">3</td>
						<td th:text="${c.lecturer}">GV</td>
						<td th:text="${c.category != null ? c.category.name : '-'}">CNTT</td>
						<td class="text-end">
							<div class="d-flex flex-wrap gap-1 justify-content-end">
								<a class="btn btn-sm btn-outline-primary" th:href="@{/admin/courses/{id}/edit(id=${c.id})}">Sửa</a>
								<form class="d-inline" th:action="@{/admin/courses/{id}/delete(id=${c.id})}" method="post"
									onsubmit="return confirm('Xóa học phần này?');">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
									<button type="submit" class="btn btn-sm btn-outline-danger">Xóa</button>
								</form>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

		<nav th:if="${page.totalPages > 1}" class="mt-4 pt-1" aria-label="Phân trang admin">
			<ul class="pagination justify-content-center flex-wrap gap-1">
				<li class="page-item" th:classappend="${page.first} ? ' disabled'">
					<a class="page-link" th:href="@{/admin/courses(page=${page.number - 1})}">Trước</a>
				</li>
				<li class="page-item disabled">
					<span class="page-link" th:text="'Trang ' + (${page.number} + 1) + ' / ' + ${page.totalPages}">1</span>
				</li>
				<li class="page-item" th:classappend="${page.last} ? ' disabled'">
					<a class="page-link" th:href="@{/admin/courses(page=${page.number + 1})}">Sau</a>
				</li>
			</ul>
		</nav>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
