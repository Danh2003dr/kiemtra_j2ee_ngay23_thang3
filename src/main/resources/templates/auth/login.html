<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Đăng nhập</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/layout :: navbar}"></div>

	<main class="container py-4 py-md-5 px-3">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-11 col-md-7 col-lg-5 col-xl-4">
				<div class="card auth-card border-0 rounded-4">
					<div class="card-body p-4 p-md-5">
						<h1 class="h4 mb-4">Đăng nhập</h1>
						<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
						<div th:if="${param.error}" class="alert alert-danger">Sai tên đăng nhập hoặc mật khẩu.</div>
						<form th:action="@{/login}" method="post" class="vstack gap-3">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<div>
								<label class="form-label" for="username">Tên đăng nhập</label>
								<input class="form-control" id="username" name="username" autocomplete="username" required>
							</div>
							<div>
								<label class="form-label" for="password">Mật khẩu</label>
								<input class="form-control" id="password" type="password" name="password" autocomplete="current-password" required>
							</div>
							<button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
						</form>
						<hr class="my-4">
						<a class="btn btn-outline-secondary w-100 mb-2" th:href="@{/oauth2/authorization/google}">
							Đăng nhập bằng Google
						</a>
						<p class="text-center text-secondary small mb-0">Chưa có tài khoản?
							<a th:href="@{/register}">Đăng ký sinh viên</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
