<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Đăng ký</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/layout :: navbar}"></div>

	<main class="container py-4 py-md-5 px-3">
		<div class="row justify-content-center">
			<div class="col-12 col-sm-11 col-md-7 col-lg-5 col-xl-4">
				<div class="card auth-card border-0 rounded-4">
					<div class="card-body p-4 p-md-5">
						<h1 class="h4 mb-4">Đăng ký sinh viên</h1>
						<form th:action="@{/register}" th:object="${registrationForm}" method="post" class="vstack gap-3">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
								<p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0">Lỗi</p>
							</div>
							<div>
								<label class="form-label" for="username">Tên đăng nhập</label>
								<input class="form-control" id="username" th:field="*{username}" maxlength="100" required>
								<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
							</div>
							<div>
								<label class="form-label" for="password">Mật khẩu</label>
								<input class="form-control" id="password" type="password" th:field="*{password}" maxlength="100" required>
								<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
							</div>
							<div>
								<label class="form-label" for="email">Email</label>
								<input class="form-control" id="email" type="email" th:field="*{email}" maxlength="255" required>
								<div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
							</div>
							<button type="submit" class="btn btn-primary w-100">Đăng ký</button>
						</form>
						<p class="text-center text-secondary small mt-3 mb-0">
							Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a>
						</p>
					</div>
				</div>
			</div>
		</div>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
