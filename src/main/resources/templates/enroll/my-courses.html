<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Học phần của tôi</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
	<div th:replace="~{fragments/layout :: navbar}"></div>

	<main class="container py-4 py-md-5 px-3 px-sm-4">
		<header class="page-hero mb-3">
			<h1 class="admin-page-title mb-2">Học phần đã đăng ký</h1>
			<p class="hero-lead mb-0">Danh sách các học phần bạn đã đăng ký thành công.</p>
		</header>

		<div class="table-responsive table-shell" th:if="${!enrollments.isEmpty()}">
			<table class="table align-middle mb-0 table-hover">
				<thead class="table-light">
					<tr>
						<th>Tên học phần</th>
						<th>Tín chỉ</th>
						<th>Giảng viên</th>
						<th>Ngày đăng ký</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="e : ${enrollments}">
						<td th:text="${e.course.name}">Tên</td>
						<td th:text="${e.course.credits}">3</td>
						<td th:text="${e.course.lecturer}">GV</td>
						<td th:text="${#temporals.format(e.enrollDate, 'dd/MM/yyyy')}">01/01/2025</td>
					</tr>
				</tbody>
			</table>
		</div>

		<div th:if="${enrollments.isEmpty()}" class="empty-state" role="status">
			<div class="empty-state-icon" aria-hidden="true">📝</div>
			<p class="mb-0 fw-semibold text-dark">Bạn chưa đăng ký học phần nào</p>
			<p class="small mt-2 mb-0">Vào danh sách học phần và chọn <strong>Đăng ký</strong> để bắt đầu.</p>
		</div>

		<p class="mt-4 mb-0">
			<a class="btn btn-outline-primary btn-sm" th:href="@{/courses}">← Danh sách học phần</a>
		</p>
	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
</body>
</html>
