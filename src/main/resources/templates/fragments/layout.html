<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<body>
	<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light app-navbar sticky-top shadow-sm">
		<div class="container">
			<a class="navbar-brand fw-semibold" th:href="@{/courses}">Đăng ký học phần</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"
				aria-controls="navMain" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navMain">
				<ul class="navbar-nav me-auto mb-2 mb-lg-0">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/courses}">Danh sách học phần</a>
					</li>
					<li class="nav-item" sec:authorize="hasRole('STUDENT') and !hasRole('ADMIN')">
						<a class="nav-link" th:href="@{/enroll/my-courses}">Học phần của tôi</a>
					</li>
					<li class="nav-item" sec:authorize="hasRole('ADMIN')">
						<a class="nav-link" th:href="@{/admin/courses}">Quản trị học phần</a>
					</li>
				</ul>
				<form class="d-flex flex-column flex-sm-row gap-2 mb-3 mb-lg-0 me-lg-3" role="search" method="get" th:action="@{/courses}">
					<input type="hidden" name="page" value="0">
					<input class="form-control form-control-sm" type="search" name="q" placeholder="Tìm theo tên học phần"
						th:value="${keyword != null ? keyword : ''}" aria-label="Tìm kiếm">
					<button class="btn btn-outline-dark btn-sm" type="submit">Tìm</button>
				</form>
				<ul class="navbar-nav">
					<li class="nav-item" sec:authorize="!isAuthenticated()">
						<a class="nav-link" th:href="@{/login}">Đăng nhập</a>
					</li>
					<li class="nav-item" sec:authorize="!isAuthenticated()">
						<a class="nav-link" th:href="@{/register}">Đăng ký</a>
					</li>
					<li class="nav-item dropdown" sec:authorize="isAuthenticated()">
						<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
							aria-expanded="false">
							<span sec:authentication="name">User</span>
						</a>
						<ul class="dropdown-menu dropdown-menu-end">
							<li><a class="dropdown-item" th:href="@{/home}">Trang chủ</a></li>
							<li>
								<form th:action="@{/logout}" method="post" class="d-inline">
									<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
									<button type="submit" class="dropdown-item">Đăng xuất</button>
								</form>
							</li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</nav>
</body>
</html>
